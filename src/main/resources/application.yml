spring:
  application:
    name: callout-backend

  # --- JPA ---
  # ddl-auto: validate means Hibernate checks your schema matches
  # your entities but NEVER creates or alters tables itself.
  # Flyway owns all schema changes — Hibernate just validates.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Supabase JWT Validation ---
  # Spring pulls Supabase's public keys from the JWKS endpoint and uses
  # them to verify every incoming JWT. No secret stored in our app.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI}

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# --- Server ---
server:
  port: 8080
  servlet:
    context-path: /api/v1

# --- Actuator ---
# /actuator/health is what AWS ALB and ECS ping to know the
# container is alive. Without this, ECS will kill your container.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# --- AWS ---
aws:
  region: ${AWS_REGION:eu-west-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME}
    presigned-url-expiry-minutes: 15
  sqs:
    incident-submitted-queue: ${SQS_INCIDENT_SUBMITTED_QUEUE}
    notification-queue: ${SQS_NOTIFICATION_QUEUE}
    archival-queue: ${SQS_ARCHIVAL_QUEUE}
  ses:
    from-email: ${SES_FROM_EMAIL:noreply@callout.app}

# --- Callout Business Config ---
callout:
  allowed-domain: ${ALLOWED_DOMAIN:pau.edu.ng}
  rate-limit:
    submissions-per-hour: 5
    comments-per-hour: 20
  archival:
    resolve-to-archive-hours: 24
    archive-to-delete-days: 7