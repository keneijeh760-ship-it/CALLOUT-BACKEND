version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: callout-postgres
    environment:
      POSTGRES_DB: callout_dev
      POSTGRES_USER: callout
      POSTGRES_PASSWORD: callout_secret
      ports:
       "5432:5432"

      volumes:
        postgres_data:/var/lib/postgresql/data

      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U callout -d callout_dev" ]
        interval: 10s
        timeout: 5s
        retries: 5

