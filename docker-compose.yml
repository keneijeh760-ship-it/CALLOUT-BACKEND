

version: '3.9'

services:


  postgres:
    image: postgres:16-alpine


    container_name: callout-postgres


    environment:
      POSTGRES_DB: callout_dev
      POSTGRES_USER: callout
      POSTGRES_PASSWORD: callout_secret


    ports:
      - "5432:5432"


    volumes:
      - postgres_data:/var/lib/postgresql/data



    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callout -d callout_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine


    container_name: callout-redis

    ports:
      - "6379:6379"


    volumes:
      - redis_data:/data


    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:


  redis_data: